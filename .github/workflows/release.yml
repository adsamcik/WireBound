name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: true
        type: string
      prerelease:
        description: 'Is this a pre-release?'
        required: false
        type: boolean
        default: false

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_NOLOGO: true
  PROJECT_PATH: src/WireBound.Avalonia/WireBound.Avalonia.csproj

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - runtime: linux-x64
            archive: tar.gz
          - runtime: win-x64
            archive: zip
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
          else
            version="${{ github.ref_name }}"
            version="${version#v}"
          fi
          echo "VERSION=$version" >> $GITHUB_OUTPUT
          echo "Version: $version"

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Publish build
        run: |
          dotnet publish ${{ env.PROJECT_PATH }} \
            --configuration Release \
            --runtime ${{ matrix.runtime }} \
            --self-contained true \
            --output ./publish/${{ matrix.runtime }} \
            -p:Version=${{ steps.version.outputs.VERSION }}

      - name: Publish Helper
        run: |
          dotnet publish src/WireBound.Helper/WireBound.Helper.csproj \
            --configuration Release \
            --runtime ${{ matrix.runtime }} \
            --self-contained true \
            --output ./publish/${{ matrix.runtime }} \
            -p:Version=${{ steps.version.outputs.VERSION }}

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Download previous Velopack release
        # Velopack auto-generates a delta when a previous full release already
        # exists in the pack's --outputDir, so download it there directly
        # (there is no --previous flag on `vpk pack`; see docs.velopack.io/packaging/deltas).
        run: vpk download github --repoUrl https://github.com/adsamcik/WireBound --channel ${{ matrix.runtime }} -o ./velopack/${{ matrix.runtime }}
        continue-on-error: true

      - name: Package with Velopack (Windows)
        if: matrix.runtime == 'win-x64'
        # The build job runs on ubuntu-latest for both matrix legs, so an explicit
        # [win] directive is required to cross-compile a Windows package here;
        # without it, `vpk pack` defaults to packaging for the host OS (Linux).
        run: |
          vpk '[win]' pack -u WireBound -v ${{ steps.version.outputs.VERSION }} \
            -p ./publish/${{ matrix.runtime }} \
            -o ./velopack/${{ matrix.runtime }} \
            -e WireBound.exe \
            --channel ${{ matrix.runtime }} || true

      - name: Package with Velopack (Linux)
        if: matrix.runtime == 'linux-x64'
        run: |
          vpk '[linux]' pack -u WireBound -v ${{ steps.version.outputs.VERSION }} \
            -p ./publish/${{ matrix.runtime }} \
            -o ./velopack/${{ matrix.runtime }} \
            -e WireBound \
            --channel ${{ matrix.runtime }} || true

      - name: Upload Velopack artifact
        # Uploading the Velopack package to GitHub Releases happens later, in the
        # single sequential `release` job, to avoid both matrix legs racing to
        # create/merge a release for the same tag at the same time.
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: Velopack-${{ steps.version.outputs.VERSION }}-${{ matrix.runtime }}
          path: ./velopack/${{ matrix.runtime }}
          retention-days: 30
          if-no-files-found: ignore

      - name: Create archive (zip)
        if: matrix.archive == 'zip'
        run: |
          cd ./publish/${{ matrix.runtime }}
          zip -r "../../WireBound-${{ steps.version.outputs.VERSION }}-${{ matrix.runtime }}.zip" .

      - name: Create archive (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          cd ./publish/${{ matrix.runtime }}
          tar -czvf "../../WireBound-${{ steps.version.outputs.VERSION }}-${{ matrix.runtime }}.tar.gz" .

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: WireBound-${{ steps.version.outputs.VERSION }}-${{ matrix.runtime }}
          path: ./WireBound-${{ steps.version.outputs.VERSION }}-${{ matrix.runtime }}.${{ matrix.archive }}
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
          else
            version="${{ github.ref_name }}"
            version="${version#v}"
          fi
          echo "VERSION=$version" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./artifacts
          pattern: WireBound-*

      - name: Generate release notes
        run: |
          version="${{ steps.version.outputs.VERSION }}"
          cat > release-notes.md << EOF
          ## WireBound v$version
          
          ### Downloads
          - **Linux (x64)**: \`WireBound-$version-linux-x64.tar.gz\` - Extract and run \`WireBound\`
          - **Windows (x64)**: \`WireBound-$version-win-x64.zip\` - Extract and run \`WireBound.exe\`
          
          ### System Requirements
          - Linux / Windows 10+
          - Self-contained (no runtime required)
          
          ### What's New
          See [CHANGELOG.md](CHANGELOG.md) for detailed changes.
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: WireBound v${{ steps.version.outputs.VERSION }}
          body_path: release-notes.md
          draft: false
          prerelease: ${{ inputs.prerelease || false }}
          files: ./artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Download Velopack artifact (win-x64)
        # Downloaded by exact name (not `pattern`) into an explicit per-runtime
        # directory, so the destination path is always known regardless of
        # whether zero, one, or both runtime artifacts exist — download-artifact@v8
        # only extracts directly into a matched `pattern`'s named subdirectory
        # when 2+ artifacts match; with exactly 1 match it flattens into the
        # shared root, which broke path lookups below when only one leg produced
        # a Velopack package.
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: Velopack-${{ steps.version.outputs.VERSION }}-win-x64
          path: ./velopack-artifacts/win-x64

      - name: Download Velopack artifact (linux-x64)
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: Velopack-${{ steps.version.outputs.VERSION }}-linux-x64
          path: ./velopack-artifacts/linux-x64

      - name: Upload Velopack packages to GitHub Release
        # Runs sequentially (one leg after the other, both within this single
        # job) after the release above already exists, so `--merge true` always
        # merges into a stable target instead of racing two parallel matrix
        # legs to create/merge the same tag's release simultaneously.
        if: always()
        run: |
          for runtime in win-x64 linux-x64; do
            dir="./velopack-artifacts/$runtime"
            if [ -d "$dir" ] && [ -n "$(ls -A "$dir" 2>/dev/null)" ]; then
              vpk upload github \
                --repoUrl https://github.com/adsamcik/WireBound \
                --tag v${{ steps.version.outputs.VERSION }} \
                --token ${{ secrets.GITHUB_TOKEN }} \
                --channel "$runtime" \
                --merge true \
                -o "$dir" || echo "Velopack upload skipped ($runtime)"
            else
              echo "No Velopack package found for $runtime, skipping upload"
            fi
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
